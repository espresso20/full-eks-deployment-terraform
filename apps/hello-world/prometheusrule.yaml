apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hello-rules
  labels:
    app: hello
spec:
  groups:
    - name: hello.rules
      interval: 30s
      rules:
        # Recording rule: pre-compute the request rate to use in dashboards/alerts.
        - record: hello:http_request_rate_5m
          expr: |
            sum by (code) (
              rate(http_requests_total{job="hello"}[5m])
            )
        # Alert: error rate above 5% for 10 minutes.
        - alert: HelloHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{job="hello", code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{job="hello"}[5m]))
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "hello-world error rate above 5% for 10 minutes"
            description: |
              Current error rate is {{ $value | humanizePercentage }}.
              Investigate hello-world logs and recent deployments.
        # Alert: no traffic at all. Catches deployment failures.
        - alert: HelloNoTraffic
          expr: |
            sum(rate(http_requests_total{job="hello"}[5m])) == 0
          for: 5m
          labels:
            severity: info
            team: platform
          annotations:
            summary: "hello-world receiving no traffic"
