# Apply manually with: kubectl apply -f optional/cluster-issuer.yaml
# (After cert-manager is healthy and its CRDs exist.)
#
# This gives you a self-signed issuer for lab work. For real Let's Encrypt
# certs, see the commented sections below.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}

---

