apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-server
  namespace: default
  labels:
    app: hello-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-server
  template:
    metadata:
      labels:
        app: hello-server
    spec:
      containers:
        - name: hello-server
          # Replaced by push-and-deploy.sh — do not edit this line manually
          image: 899060413090.dkr.ecr.us-east-1.amazonaws.com/hello-server:remediated
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
